services:
  db:
    image: postgres:16
    container_name: medcost_db
    environment:
      POSTGRES_DB: medcost_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medcost_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: medcost_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/medcost_db
      MODEL_PATH: /app/models/rf_pipeline.joblib
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend-react:
    build:
      context: .
      dockerfile: src/frontend-react/Dockerfile
    container_name: medcost_frontend_react
    environment:
      VITE_API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
