services:
  db:
    image: postgres:16
    container_name: medcost_db
    environment:
      POSTGRES_DB: medcost_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medcost_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: medcost_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/medcost_db
      MODEL_PATH: /app/models/rf_pipeline.joblib
      DADATA_API_KEY: ${DADATA_API_KEY:-}
      DADATA_API_SECRET: ${DADATA_API_SECRET:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend-react:
    build:
      context: .
      dockerfile: src/frontend-react/Dockerfile
    container_name: medcost_frontend_react
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: medcost_nginx
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8501:80"
    depends_on:
      - frontend-react
      - backend
